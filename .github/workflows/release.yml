name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build the Linux binaries with `cross`, not natively. A native build on
          # ubuntu-latest links against that runner's glibc (2.39 on 24.04), so the
          # binary refuses to start on anything older — Debian 12 (2.36), Ubuntu
          # 22.04 (2.35), Rocky 9 (2.34) — which is most of the VMs people actually
          # run. cross builds in an old-glibc image (~2.18), so the binary runs
          # essentially anywhere. aarch64 already did this; x86_64 was the outlier.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="agenta-${VERSION}-${{ matrix.target }}.tar.gz"
          cp target/${{ matrix.target }}/release/agenta .
          cp target/${{ matrix.target }}/release/agenta-daemon .
          tar -czf "${ARCHIVE}" agenta agenta-daemon
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Agenta ${{ github.ref_name }}" \
            --generate-notes \
            dist/* \
          || gh release upload "${{ github.ref_name }}" dist/* --clobber

  notify-docs:
    name: Rebuild docs site
    needs: release
    runs-on: ubuntu-latest
    steps:
      # The docs version badge is fetched at BUILD time, so a new release doesn't
      # update it until the docs site rebuilds. Ping the Netlify build hook so the
      # badge (and anything else version-derived) refreshes on its own. No-ops
      # cleanly if the secret isn't configured, so this never blocks a release.
      - name: Trigger Netlify docs rebuild
        env:
          HOOK: ${{ secrets.DOCS_BUILD_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "DOCS_BUILD_HOOK_URL secret not set — skipping docs rebuild."
            echo "Add it (Settings → Secrets and variables → Actions) to auto-refresh the docs on release."
            exit 0
          fi
          echo "Triggering Netlify docs rebuild for ${{ github.ref_name }}..."
          curl -fsS -X POST -d '{}' "$HOOK" && echo "Docs rebuild triggered."
